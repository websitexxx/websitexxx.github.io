<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[Trang chủ]</title>
    <style>   
        /* CSS để tạo khung bo góc */
        .rounded-box {
            width: 300px;
            height: 200px;
            background-color: rgb(110, 106, 106);
            border-radius: 15px; /* Điều này sẽ tạo ra góc bo tròn */
            padding: 20px; /* Thêm padding để tạo khoảng trắng xung quanh nội dung */
        }
   
    </style>
</head>
<body>
        <div class="rounded-box">
        <h1>Nội dung trong khung bo góc</h1>
        <p>khung bo góc</p>
        </div>
</body>
</html>

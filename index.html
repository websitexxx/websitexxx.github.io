        body {
            background-color: #1f1f1f;
            color: #fff;

            margin: 0;
            padding: 0;

        .maintenance-container {
            max-width: 600px;
            padding: 20px;

            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);

            0% {
                transform: rotate(0deg);
            }

  text-align: center;
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  color: white;
  padding: 10px;
  animation: nhapnhay 1s linear infinite;
}

  0% { background-position: 0% 0%; }
  100% { background-position: 100% 0%; }
}

/* Sử dụng linear-gradient để tạo màu trượt dọc */

  background: linear-gradient(to right, violet, indigo, blue, green, yellow, orange, red, violet, indigo, blue, green);

            font-size: 24px;

<body>

<div class="maintenance-container">
    <h1>Đang Bảo Trì</h1>
    <p>Chúng tôi đang nâng cấp hệ thống để mang đến trải nghiệm tốt nhất cho bạn. Hãy quay lại sau.</p>
    <div id="countdown"></div>
</div>


<script>
 function updateClock() {
        var now = new Date();
        var hours = now.getHours();
        var minutes = now.getMinutes();
        var seconds = now.getSeconds();

        // Pad single digit minutes and seconds with a leading zero
        minutes = minutes < 10 ? '0' + minutes : minutes;
        seconds = seconds < 10 ? '0' + seconds : seconds;

        var currentTime = hours + ':' + minutes + ':' + seconds;
        document.getElementById('real-time').innerText = `Bây giờ là: ${currentTime}`;

        // Update every second
        setTimeout(updateClock, 1000);
    }
    document.addEventListener("DOMContentLoaded", function () {
    // Ngày đích đến (1/1/2024)
    const targetDate = new Date("January 1, 2024 00:00:00").getTime();

    // Cập nhật đếm ngược mỗi giây
    const countdownInterval = setInterval(function () {
        const currentDate = new Date().getTime();
        const timeRemaining = targetDate - currentDate;

        // Tính toán thời gian còn lại
        const days = Math.floor(timeRemaining / (1000 * 60 * 60 * 24));
        const hours = Math.floor((timeRemaining % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((timeRemaining % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((timeRemaining % (1000 * 60)) / 1000);

        // Hiển thị đếm ngược trên trang web
        document.getElementById("countdown").innerHTML = `${days} ngày ${hours} giờ ${minutes} phút ${seconds} giây`;

        // Kiểm tra nếu đã đạt đến ngày đích đến
        if (timeRemaining < 0) {
            clearInterval(countdownInterval);
            document.getElementById("countdown").innerHTML = "Đã đến ngày 1/1/2024!";
        }
    }, 1000);
});

</script>

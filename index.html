<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trang chủ</title>
</head>
    <style>
        body {
            background-color: #1f1f1f;
            color: #fff;
            font-family: 'Arial', sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .maintenance-container {
            max-width: 600px;
            padding: 20px;
            background-color: #333;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #4caf50;
        }

        p {
            font-size: 18px;
        }

        .tech-icon {
            width: 50px;
            height: 50px;
            margin-bottom: 20px;
        }

        @keyframes rotate {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .rotate {
            animation: rotate 2s linear infinite;
        }
    </style>
</head>
<body>

    <div class="maintenance-container">
        <h1>Đang Bảo Trì</h1>
        <p>Chúng tôi đang nâng cấp hệ thống để mang đến trải nghiệm tốt nhất cho bạn. Hãy quay lại sau.</p>
    </div>

</body>
</html>

</body>
</html>
